{% extends "base.html" %}
{% block title %}Cập nhật thông tin{% endblock %}
{% block content %}
<div class="card p-4" style="max-width:480px;margin:auto;">
  <h4 class="mb-3">Cập nhật thông tin cá nhân</h4>
  <form method="post">
    <div class="mb-3">
      <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
      <input type="text" name="name" class="form-control" value="{{ form.get('name','') }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Email <span class="text-danger">*</span></label>
      <input type="email" name="email" class="form-control" value="{{ form.get('email','') }}" required>
      <div class="form-text">Đổi email cũng sẽ đổi tài khoản dùng để đăng nhập lần sau.</div>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
      <a href="{{ url_for('account_view') }}" class="btn btn-secondary">Hủy bỏ</a>
    </div>
  </form>
</div>
{% endblock %}
